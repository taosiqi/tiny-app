name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest  # arm64，Apple Silicon M 系列
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Mac (arm64)
        run: pnpm build:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac arm64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  build-mac-x64:
    runs-on: macos-13  # x64，英特尔
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Mac (x64)
        run: pnpm build:mac:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac x64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows
        run: pnpm build:win

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
